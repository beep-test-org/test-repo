<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Todo App</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    input { padding: 8px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 14px; margin-left: 6px; cursor: pointer; }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #999; }
    .delete { color: red; background: none; border: none; cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>

<h2>📝 Todo App</h2>
<input id="input" type="text" placeholder="Add a todo..." />
<button onclick="addTodo()">Add</button>
<ul id="list"></ul>
<p>Completed: <strong id="count"></strong></p>

<script>
  // BUG 1: todos is never initialized as an array properly in one flow
  var todos;

  function addTodo() {
    var text = document.getElementById('input').value;

    // BUG 2: no empty check — pushes empty string, then .trim() called on undefined below
    todos.push({ text: text, done: false });

    renderTodos();
    document.getElementById('input').value = '';
  }

  function deleteTodo(index) {
    // BUG 3: splice on undefined when todos wasn't initialized
    todos.splice(index, 1);
    renderTodos();
  }

  function toggleTodo(index) {
    // BUG 4: todos[index] can be undefined if index is out of bounds
    todos[index].done = !todos[index].done;
    renderTodos();
  }

  function renderTodos() {
    var list = document.getElementById('list');
    list.innerHTML = '';

    for (var i = 0; i < todos.length; i++) {
      var todo = todos[i];

      // BUG 5: todo.text.trim() throws if text is undefined
      var label = todo.text.trim();

      var li = document.createElement('li');
      if (todo.done) li.className = 'done';
      li.innerHTML =
        '<span onclick="toggleTodo(' + i + ')">' + label + '</span>' +
        '<button class="delete" onclick="deleteTodo(' + i + ')">✕</button>';
      list.appendChild(li);
    }

    // BUG 6: updateCount() called but defined below with a typo in one path
    updateCount();
  }

  function updateCount() {
    var completed = todos.filter(function(t) {
      // BUG 7: t is undefined when todos has a corrupt entry
      return t.done === true;
    });

    // BUG 8: .length on null if completed is somehow null (defensive bug)
    document.getElementById('count').innerText = completed.length + ' / ' + todos.length;
  }
</script>

</body>
</html>
